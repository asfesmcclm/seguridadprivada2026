<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Convenio Seguridad 2026-2030</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .accordion-content { transition: max-height 0.3s ease-out; overflow: hidden; max-height: 0; }
        .accordion-content.open { max-height: 5000px; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans pb-10">

    <header class="sticky top-0 z-50 bg-slate-800 text-white shadow-lg">
        <div class="p-4 max-w-xl mx-auto">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i data-lucide="shield-check" class="text-blue-400"></i>
                Seguridad Privada 26-30
            </h1>
            <div class="mt-3 relative">
                <input type="text" id="searchInput" placeholder="Busca artículo, sueldo, plus..." 
                    class="w-full p-3 rounded-xl bg-slate-700 border-none text-white placeholder-slate-400 focus:ring-2 focus:ring-blue-500 shadow-inner">
                <i data-lucide="search" class="absolute right-3 top-3.5 text-slate-400 w-5 h-5"></i>
            </div>
        </div>
    </header>

    <main class="p-4 max-w-xl mx-auto" id="app">
        <div id="loading" class="text-center py-20 text-slate-500">
            <div class="animate-spin mb-4 mx-auto w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full"></div>
            <p class="font-medium">Cargando base de datos legal...</p>
        </div>
    </main>

    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" 
        class="fixed bottom-6 right-6 bg-blue-600 text-white p-3 rounded-full shadow-2xl active:scale-95 transition-transform">
        <i data-lucide="arrow-up"></i>
    </button>

    <script src="app.js"></script>
</body>
</html>
